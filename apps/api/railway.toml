[build]
builder = "nixpacks"
buildCommand = "npx prisma generate --schema=./prisma/schema.prisma && npx nest build"

[deploy]
startCommand = "npx prisma db push --schema=./prisma/schema.prisma --skip-generate --accept-data-loss && npx tsx prisma/ensure-admin.ts && node dist/src/main.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
